name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - '.storybook/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter @extedcoud/smart-components build

      - name: Build Storybook
        run: pnpm --filter @extedcoud/smart-components build-storybook

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: pnpm --filter docs build
        env:
          DOCS_BASE_PATH: /smart-components

      - name: Bundle Storybook into docs out
        run: |
          mkdir -p docs/out/storybook
          cp -R storybook-static/. docs/out/storybook/
          touch docs/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
